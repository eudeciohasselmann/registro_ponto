services:
  backend:
    build:
      context: ./backend
    container_name: ponto-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost:8080
    volumes:
      - ./backend/ponto.db:/app/ponto.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ponto-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped